<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>World Cup 2026 - Family Sweepstakes</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: linear-gradient(160deg, #0a0a1a 0%, #0d1b2a 50%, #0a1628 100%);
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #fff;
      padding: 24px 16px 40px;
    }

    header {
      text-align: center;
      margin-bottom: 32px;
    }

    header .ball { font-size: 2.5rem; margin-bottom: 4px; }

    header h1 {
      font-size: clamp(1.5rem, 5vw, 2.2rem);
      font-weight: 800;
      background: linear-gradient(90deg, #f59e0b, #fcd34d, #f59e0b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.02em;
    }

    header .subtitle {
      color: rgba(255,255,255,0.4);
      font-size: 0.85rem;
      margin-top: 4px;
      letter-spacing: 0.15em;
    }

    #refresh-btn {
      margin-top: 14px;
      background: rgba(245,158,11,0.15);
      border: 1px solid rgba(245,158,11,0.4);
      color: #f59e0b;
      border-radius: 20px;
      padding: 8px 20px;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      transition: all 0.2s;
    }
    #refresh-btn:hover { background: rgba(245,158,11,0.25); }
    #refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    #last-updated {
      color: rgba(255,255,255,0.25);
      font-size: 0.68rem;
      margin-top: 8px;
      min-height: 1em;
    }

    #error-msg {
      display: none;
      margin-top: 10px;
      background: rgba(239,68,68,0.15);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 0.75rem;
      color: #fca5a5;
      display: inline-block;
    }

    #leaderboard {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      margin-bottom: 28px;
      padding-bottom: 8px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .lb-pill {
      background: rgba(255,255,255,0.05);
      border-radius: 20px;
      padding: 5px 12px;
      font-size: 0.75rem;
      border: 1px solid rgba(255,255,255,0.1);
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }
    .lb-pill .lb-pts { color: #f59e0b; font-weight: 700; }
    .lb-pill .lb-rank { opacity: 0.7; }

    #grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
      gap: 16px;
      max-width: 1100px;
      margin: 0 auto;
    }

    .card {
      border-radius: 16px;
      padding: 20px;
      position: relative;
      overflow: hidden;
      transition: transform 0.2s;
      border: 1px solid rgba(255,255,255,0.08);
    }
    .card:hover { transform: translateY(-3px); }
    .card.eliminated { opacity: 0.6; }

    .card-rank {
      position: absolute;
      top: 12px;
      right: 12px;
      font-size: 1.3rem;
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }
    .card-flag { font-size: 2.4rem; line-height: 1; }
    .card-owner {
      color: rgba(255,255,255,0.5);
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .card-team {
      color: #fff;
      font-size: 1.15rem;
      font-weight: 700;
      line-height: 1.2;
    }
    .card-group {
      color: rgba(255,255,255,0.45);
      font-size: 0.68rem;
      margin-top: 2px;
    }

    .stage-pill {
      display: inline-block;
      background: rgba(255,255,255,0.15);
      color: #fff;
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 0.68rem;
      font-weight: 600;
      margin-bottom: 12px;
    }
    .stage-pill.champion { background: #f59e0b; color: #000; }
    .stage-pill.eliminated-pill { background: #374151; }

    .stats-row {
      display: flex;
      gap: 6px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .stat-box {
      text-align: center;
      padding: 6px 10px;
      background: rgba(255,255,255,0.05);
      border-radius: 8px;
      min-width: 38px;
    }
    .stat-box.highlight { background: rgba(255,255,255,0.12); }
    .stat-val {
      font-size: 1.1rem;
      font-weight: 700;
      color: #fff;
    }
    .stat-lbl {
      font-size: 0.62rem;
      color: rgba(255,255,255,0.55);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .last-result {
      margin-bottom: 10px;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.7);
      display: flex;
      align-items: center;
    }

    .result-badge {
      border-radius: 4px;
      padding: 2px 7px;
      font-size: 0.72rem;
      font-weight: 700;
      margin-right: 6px;
      color: #fff;
    }
    .result-badge.W { background: #22c55e; }
    .result-badge.D { background: #f59e0b; }
    .result-badge.L { background: #ef4444; }

    .next-match {
      background: rgba(0,0,0,0.25);
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 0.72rem;
      color: rgba(255,255,255,0.7);
    }
    .next-label {
      color: rgba(255,255,255,0.4);
      margin-right: 6px;
    }

    .schedule-item {
      font-size: 0.68rem;
      color: rgba(255,255,255,0.45);
      margin-bottom: 3px;
    }

    .elim-label {
      position: absolute;
      bottom: 10px;
      right: 12px;
      font-size: 0.65rem;
      color: rgba(255,255,255,0.3);
      font-weight: 600;
      letter-spacing: 0.1em;
    }

    footer {
      text-align: center;
      margin-top: 32px;
      color: rgba(255,255,255,0.2);
      font-size: 0.68rem;
    }
  </style>
</head>
<body>

<header>
  <div class="ball">&#x26BD;</div>
  <h1>World Cup 2026</h1>
  <div class="subtitle">FAMILY SWEEPSTAKES</div>
  <br>
  <button id="refresh-btn" onclick="loadData()">&#x21BB; Refresh Live Data</button>
  <div id="last-updated"></div>
  <div id="error-msg"></div>
</header>

<div id="leaderboard"></div>
<div id="grid"></div>

<footer>&#x1F3C6; World Cup 2026 &middot; USA, Canada &amp; Mexico &middot; Jun 11 &ndash; Jul 19</footer>

<script>
const SWEEPSTAKE = [
  { name: "Jacky",  team: "Portugal",    flag: "\uD83C\uDDF5\uD83C\uDDF9", group: "K", color: "#006B3F" },
  { name: "Yasmin", team: "England",     flag: "\uD83C\uDDEC\uD83C\uDDE7", group: "L", color: "#CF091B" },
  { name: "Trevor", team: "Brazil",      flag: "\uD83C\uDDE7\uD83C\uDDF7", group: "C", color: "#009C3B" },
  { name: "Louise", team: "Spain",       flag: "\uD83C\uDDEA\uD83C\uDDF8", group: "H", color: "#AA151B" },
  { name: "Harley", team: "France",      flag: "\uD83C\uDDEB\uD83C\uDDF7", group: "I", color: "#002395" },
  { name: "Finley", team: "Netherlands", flag: "\uD83C\uDDF3\uD83C\uDDF1", group: "F", color: "#FF4F00" },
  { name: "Leon",   team: "Morocco",     flag: "\uD83C\uDDF2\uD83C\uDDE6", group: "C", color: "#C1272D" },
  { name: "Calum",  team: "Argentina",   flag: "\uD83C\uDDE6\uD83C\uDDF7", group: "J", color: "#74ACDF" },
];

const SCHEDULES = {
  Portugal:    [["Jun 17","DR Congo","1pm ET"],["Jun 23","Uzbekistan","1pm ET"],["Jun 28","Colombia","7:30pm ET"]],
  England:     [["Jun 17","Croatia","4pm ET"],["Jun 23","Ghana","4pm ET"],["Jun 28","Panama","TBD"]],
  Brazil:      [["Jun 13","Morocco","6pm ET"],["Jun 20","Scotland","TBD"],["Jun 24","Haiti","TBD"]],
  Spain:       [["Jun 15","Cape Verde","1pm ET"],["Jun 21","Saudi Arabia","noon ET"],["Jun 26","Uruguay","8pm ET"]],
  France:      [["Jun 16","Senegal","3pm ET"],["Jun 22","Iraq","5pm ET"],["Jun 26","Norway","3pm ET"]],
  Netherlands: [["Jun 14","Japan","4pm ET"],["Jun 20","Sweden","1pm ET"],["Jun 25","Tunisia","7pm ET"]],
  Morocco:     [["Jun 13","Brazil","6pm ET"],["Jun 20","Haiti","TBD"],["Jun 24","Scotland","6pm ET"]],
  Argentina:   [["Jun 16","Algeria","9pm ET"],["Jun 22","Austria","1pm ET"],["Jun 27","Jordan","10pm ET"]],
};

let liveData = null;

async function loadData() {
  const btn = document.getElementById('refresh-btn');
  const errEl = document.getElementById('error-msg');
  btn.disabled = true;
  btn.textContent = '\u27F3 Refreshing...';
  errEl.style.display = 'none';

  const today = new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
  const teamList = SWEEPSTAKE.map(t => t.team + ' (Group ' + t.group + ')').join(', ');

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        tools: [{ type: 'web_search_20250305', name: 'web_search' }],
        system: `You are a sports data assistant. Today is ${today}. The 2026 FIFA World Cup is currently being played in the USA, Canada and Mexico. Search for the very latest match results and standings for these specific teams. Return ONLY a JSON object (no markdown, no backticks, no preamble) with this exact structure:
{"teams":{"TeamName":{"status":"Active or Eliminated","stage":"Group Stage or Round of 32 or Quarter-Finals or Semi-Finals or Final or Champions or Eliminated","played":0,"won":0,"drawn":0,"lost":0,"gf":0,"ga":0,"points":0,"groupPosition":1,"lastResult":"W 3-1 vs X or D 1-1 vs Y or L 0-2 vs Z or No games yet","nextMatch":"vs Opponent, Date or Eliminated or TBD"}},"lastUpdated":"time"}`,
        messages: [{
          role: 'user',
          content: 'Search for the latest FIFA World Cup 2026 results and group standings for: ' + teamList + '. Return their current stats as JSON.'
        }]
      })
    });

    const data = await res.json();
    const text = data.content.filter(b => b.type === 'text').map(b => b.text).join('');
    const clean = text.replace(/```json\s*/gi, '').replace(/```\s*/g, '').trim();
    const parsed = JSON.parse(clean);
    liveData = parsed.teams;
    document.getElementById('last-updated').textContent = 'Last updated: ' + new Date().toLocaleTimeString();
  } catch (e) {
    errEl.textContent = '\u26A0 Could not fetch live data. Showing schedule info only.';
    errEl.style.display = 'inline-block';
  }

  btn.disabled = false;
  btn.textContent = '\u21BB Refresh Live Data';
  render();
}

function sortedEntries() {
  return [...SWEEPSTAKE].sort((a, b) => {
    const sa = liveData && liveData[a.team];
    const sb = liveData && liveData[b.team];
    if (!sa && !sb) return 0;
    if (!sa) return 1;
    if (!sb) return -1;
    if (sa.stage === 'Champions') return -1;
    if (sb.stage === 'Champions') return 1;
    if (sa.status === 'Eliminated' && sb.status !== 'Eliminated') return 1;
    if (sb.status === 'Eliminated' && sa.status !== 'Eliminated') return -1;
    return (sb.points || 0) - (sa.points || 0);
  });
}

function render() {
  const sorted = sortedEntries();
  renderLeaderboard(sorted);
  renderGrid(sorted);
}

function renderLeaderboard(sorted) {
  const lb = document.getElementById('leaderboard');
  if (!liveData) { lb.innerHTML = ''; return; }
  lb.innerHTML = sorted.map((e, i) => {
    const s = liveData[e.team];
    const borderColor = i < 3 ? e.color + '66' : 'rgba(255,255,255,0.1)';
    return `<div class="lb-pill" style="border-color:${borderColor}">
      <span class="lb-rank">#${i+1}</span>
      <span>${e.flag}</span>
      <span style="font-weight:600">${e.name}</span>
      ${s ? `<span class="lb-pts">${s.points || 0}pts</span>` : ''}
    </div>`;
  }).join('');
}

function renderGrid(sorted) {
  const grid = document.getElementById('grid');
  grid.innerHTML = sorted.map((e, i) => cardHTML(e, i+1)).join('');
}

function cardHTML(e, rank) {
  const s = liveData && liveData[e.team];
  const isElim = s && s.status === 'Eliminated';
  const isChamp = s && s.stage === 'Champions';

  const bg = isChamp
    ? 'linear-gradient(135deg,#7c5c00,#c8a000)'
    : isElim
    ? 'linear-gradient(135deg,#1a1a2e,#16213e)'
    : `linear-gradient(135deg,${e.color}cc,${e.color}55)`;

  const borderColor = isElim ? 'rgba(255,255,255,0.08)' : e.color + '88';

  let rankBadge = '';
  if (rank <= 3 && !isElim) {
    rankBadge = `<div class="card-rank">${rank===1?'&#x1F947;':rank===2?'&#x1F948;':'&#x1F949;'}</div>`;
  }

  const nextSched = !s && (SCHEDULES[e.team] || [])[0];
  const stageTxt = s ? s.stage : (nextSched ? 'Next: ' + nextSched[0] + ' vs ' + nextSched[1] + ' (' + nextSched[2] + ')' : 'Awaiting data');
  let stagePill = `<span class="stage-pill${isChamp?' champion':isElim?' eliminated-pill':''}">${stageTxt}</span>`;

  let statsRow = '';
  if (s) {
    statsRow = `<div class="stats-row">
      ${statBox('Pts', s.points, true)}
      ${statBox('W', s.won)}
      ${statBox('D', s.drawn)}
      ${statBox('L', s.lost)}
      ${statBox('GF', s.gf)}
      ${statBox('GA', s.ga)}
    </div>`;
  }

  let lastResult = '';
  if (s && s.lastResult && s.lastResult !== 'No games yet') {
    const letter = s.lastResult[0];
    const rest = s.lastResult.slice(2);
    lastResult = `<div class="last-result">
      <span class="result-badge ${letter}">${letter}</span>
      ${rest}
    </div>`;
  }

  let nextMatch = '';
  if (s && !isElim && s.nextMatch && s.nextMatch !== 'Eliminated') {
    nextMatch = `<div class="next-match"><span class="next-label">NEXT</span>${s.nextMatch}</div>`;
  }

  let schedule = '';
  if (!s) {
    const sched = SCHEDULES[e.team] || [];
    schedule = sched.slice(0,2).map(m =>
      `<div class="schedule-item">&#x1F4C5; ${m[0]} vs ${m[1]} (${m[2]})</div>`
    ).join('');
  }

  let elimLabel = isElim ? '<div class="elim-label">ELIMINATED</div>' : '';

  return `<div class="card${isElim?' eliminated':''}" style="background:${bg};border-color:${borderColor}">
    ${rankBadge}
    <div class="card-header">
      <div class="card-flag">${e.flag}</div>
      <div>
        <div class="card-owner">${e.name}</div>
        <div class="card-team">${e.team}</div>
        <div class="card-group">Group ${e.group}</div>
      </div>
    </div>
    <div>${stagePill}</div>
    ${statsRow}
    ${lastResult}
    ${nextMatch}
    ${schedule}
    ${elimLabel}
  </div>`;
}

function statBox(label, value, highlight) {
  return `<div class="stat-box${highlight?' highlight':''}">
    <div class="stat-val">${value !== undefined && value !== null ? value : '&ndash;'}</div>
    <div class="stat-lbl">${label}</div>
  </div>`;
}

// Load on start
loadData();
</script>
</body>
</html>
